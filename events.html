{% extends "base.html" %}
{% block content %}

<h1 class="mb-4">Available Events</h1>

<div class="row">
    {% for e in events %}
    <div class="col-md-4 mb-4">
        <div class="card shadow p-3">
            <h4>{{ e[1] }}</h4>
            <p><strong>Date:</strong> {{ e[3] }}</p>
            <p><strong>Venue:</strong> {{ e[4] }}</p>

            <a href="/event/{{ e[0] }}" class="btn btn-primary">View Details</a>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
