{% extends "base.html" %}
{% block content %}
{% if event %}
<div class="container mt-4">
    <a href="/events" class="btn btn-secondary mb-3">← Back to Events</a>
    <div class="card p-4 shadow">
        <h2 class="fw-bold">{{ event[1] }}</h2>
        <p><strong>Date:</strong> {{ event[3] }}</p>
        <p><strong>Venue:</strong> {{ event[5] }}</p>
        <p class="mt-3"><strong>Description:</strong></p>
        <p>{{ event[4] }}</p>
        <form action="/register/{{ event[0] }}" method="post" class="mt-4">
    <label class="fw-bold mb-2">Select Student:</label>
    <select name="student_id" class="form-select mb-3" required>
        {% for s in students %}
            <option value="{{ s[0] }}">{{ s[1] }}</option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn-success">
        Register & Get QR Ticket
    </button>
</form>
    </div>
</div>
{% else %}
<h2 class="text-center text-danger">Event Not Found</h2>
{% endif %}
{% endblock %}
